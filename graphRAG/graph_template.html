<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Graph</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --border: #1e2d45;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --accent: #38bdf8;

      --c-org: #4ECDC4;
      --c-person: #FF6B6B;
      --c-leg: #60a5fa;
      --c-case: #FBBF24;
      --c-concept: #86efac;
      --c-gov: #c084fc;
      --c-ai: #fb923c;
      --c-other: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stats {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
    }

    .stats span {
      color: var(--text);
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    /* ── Legend items ────────────────────────────────────────────── */
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .legend-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .legend-item.disabled {
      opacity: 0.3;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-name {
      font-size: 12px;
      color: var(--text);
      flex: 1;
    }

    .legend-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ── Search ──────────────────────────────────────────────────── */
    .search-wrap {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .search-form {
      display: flex;
      gap: 8px;
    }

    input[type="search"] {
      flex: 1;
      min-width: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="search"]:focus {
      border-color: var(--accent);
    }

    input[type="search"]::placeholder {
      color: var(--text-muted);
    }

    #btn-search,
    #btn-clear {
      flex: 0 0 auto;
    }

    .search-feedback {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      color: var(--c-person);
      margin-top: 8px;
      display: none;
    }

    /* ── Controls ────────────────────────────────────────────────── */
    .controls {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .control-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    button {
      flex: 1;
      padding: 6px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Canvas ──────────────────────────────────────────────────── */
    #graph-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    /* ── Links ───────────────────────────────────────────────────── */
    .link {
      stroke: #1e3a5f;
      stroke-opacity: 0.7;
      stroke-width: 1.5px;
      transition: stroke 0.2s, stroke-opacity 0.2s;
    }

    .link.highlighted {
      stroke: var(--accent);
      stroke-opacity: 1;
      stroke-width: 2px;
    }

    .link.dimmed {
      stroke-opacity: 0.08;
    }

    /* ── Edge labels ─────────────────────────────────────────────── */
    .edge-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      fill: #334155;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .edge-label.visible {
      opacity: 1;
    }

    /* ── Nodes ───────────────────────────────────────────────────── */
    .node circle {
      stroke: rgba(255, 255, 255, 0.15);
      stroke-width: 1.5px;
      cursor: pointer;
      transition: stroke 0.15s, stroke-width 0.15s, filter 0.15s;
    }

    .node circle:hover {
      stroke: white;
      stroke-width: 2.5px;
      filter: brightness(1.3);
    }

    .node.selected circle {
      stroke: white;
      stroke-width: 3px;
      filter: brightness(1.4);
    }

    .node.dimmed circle {
      opacity: 0.12;
    }

    .node.dimmed text {
      opacity: 0.05;
    }

    .node text {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      fill: var(--text);
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: middle;
      transition: opacity 0.2s;
    }

    /* ── Tooltip ─────────────────────────────────────────────────── */
    #tooltip {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 13px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      max-width: 260px;
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    #tooltip.visible {
      opacity: 1;
    }

    .tt-name {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 3px;
      color: var(--text);
    }

    .tt-type {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .tt-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .tt-connections {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 6px;
      margin-top: 4px;
    }

    .tt-connections span {
      color: var(--accent);
    }
  </style>
</head>

<body>

  <header>
    <h1>Knowledge Graph — AI Copyright &amp; Governance</h1>
    <div class="stats">
      nodes <span id="stat-nodes">—</span> &nbsp;|&nbsp;
      edges <span id="stat-edges">—</span> &nbsp;|&nbsp;
      communities <span id="stat-communities">—</span>
    </div>
  </header>

  <div class="layout">

    <!-- ── Sidebar ─────────────────────────────────────── -->
    <aside class="sidebar">

      <div class="search-wrap">
        <form id="search-form" class="search-form">
          <input type="search" id="search" placeholder="Search nodes…">
          <button type="submit" id="btn-search">Search</button>
          <button type="button" id="btn-clear">Clear</button>
        </form>
        <div id="search-feedback" class="search-feedback">No node found</div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label" style="display:flex; justify-content:space-between; align-items:center;">
          <span>Filter by Type</span>
          <button id="btn-clear-filters"
            style="font-size:11px; padding:2px 6px; background:transparent; border:1px solid #556; color:#aab; cursor:pointer; border-radius:3px;">Clear
            Filters</button>
        </div>
        <div id="filter-state" style="font-size:12px; color:var(--text-muted); margin-bottom:8px; font-style:italic;">
          Showing: All</div>
        <div id="legend" style="display:flex; flex-direction:column; gap:5px;"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Controls</div>
        <div class="controls">
          <div class="control-row">
            <div class="control-label">Link distance</div>
            <input type="range" id="link-distance" min="40" max="300" value="120">
          </div>
          <div class="control-row">
            <div class="control-label">Charge strength</div>
            <input type="range" id="charge" min="-800" max="-50" value="-300">
          </div>
          <div class="control-row">
            <div class="control-label">Edge labels</div>
            <input type="range" id="label-threshold" min="0" max="10" value="3"
              title="Show labels on edges connecting nodes with degree ≥ this value">
          </div>
          <div class="btn-row">
            <button id="btn-reset">Reset zoom</button>
          </div>
        </div>
      </div>

    </aside>

    <!-- ── Graph canvas ────────────────────────────────── -->
    <div id="graph-container">
      <svg id="graph">
        <defs>
          <marker id="arrow" viewBox="0 -4 10 8" refX="18" refY="0" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0,-4L10,0L0,4" fill="#1e3a5f" />
          </marker>
        </defs>
        <g id="root"></g>
      </svg>
      <div id="tooltip"></div>
    </div>

  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════════
    // DATA — injected by Python (replace GRAPH_DATA_PLACEHOLDER with real data)
    // ═══════════════════════════════════════════════════════════════════════════
    const GRAPH_DATA = GRAPH_DATA_PLACEHOLDER;

    // ═══════════════════════════════════════════════════════════════════════════
    // COLOUR MAP
    // ═══════════════════════════════════════════════════════════════════════════
    const COLOR_MAP = {
      ORGANIZATION: "#4ECDC4",
      PERSON: "#FF6B6B",
      LOCATION: "#34d399",
      EVENT: "#fb923c",
      OBJECT: "#fde047",
      CONCEPT: "#86efac",
      PRODUCT: "#f97316",
      LEGISLATION: "#60a5fa",
      LEGAL_CASE: "#FBBF24",
      GOVERNMENT: "#c084fc",
      AI_SYSTEM: "#a78bfa",
      TECHNOLOGY: "#e879f9",
      OTHER: "#94a3b8",
    };

    function nodeColor(type) {
      return COLOR_MAP[type] || COLOR_MAP.OTHER;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // SETUP
    // ═══════════════════════════════════════════════════════════════════════════
    const svg = d3.select("#graph");
    const root = d3.select("#root");
    const tooltip = document.getElementById("tooltip");
    const container = document.getElementById("graph-container");

    let W = container.clientWidth;
    let H = container.clientHeight;

    // Zoom behaviour
    const zoom = d3.zoom()
      .scaleExtent([0.1, 4])
      .on("zoom", e => root.attr("transform", e.transform));
    svg.call(zoom);

    // ═══════════════════════════════════════════════════════════════════════════
    // FORCE SIMULATION
    // ═══════════════════════════════════════════════════════════════════════════
    const nodes = GRAPH_DATA.nodes.map(d => ({ ...d }));
    const links = GRAPH_DATA.links.map(d => ({ ...d }));

    // Compute degree for node sizing
    const degreeMap = {};
    links.forEach(l => {
      degreeMap[l.source] = (degreeMap[l.source] || 0) + 1;
      degreeMap[l.target] = (degreeMap[l.target] || 0) + 1;
    });
    nodes.forEach(n => { n.degree = degreeMap[n.id] || 1; });

    const maxDeg = Math.max(...nodes.map(n => n.degree));
    const minDeg = Math.min(...nodes.map(n => n.degree));
    const nodeRadius = d => {
      const t = (d.degree - minDeg) / (maxDeg - minDeg || 1);
      return 8 + t * 28;  // 8px → 36px
    };

    let simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(120))
      .force("charge", d3.forceManyBody().strength(-300))
      .force("center", d3.forceCenter(W / 2, H / 2))
      .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 6));

    // ═══════════════════════════════════════════════════════════════════════════
    // DRAW LINKS
    // ═══════════════════════════════════════════════════════════════════════════
    const linkGroup = root.append("g").attr("class", "links");
    const labelGroup = root.append("g").attr("class", "edge-labels");
    const nodeGroup = root.append("g").attr("class", "nodes");

    const link = linkGroup.selectAll("line")
      .data(links)
      .join("line")
      .attr("class", "link")
      .attr("marker-end", "url(#arrow)");

    const edgeLabel = labelGroup.selectAll("text")
      .data(links)
      .join("text")
      .attr("class", "edge-label")
      .text(d => d.label || "");

    // ═══════════════════════════════════════════════════════════════════════════
    // DRAW NODES
    // ═══════════════════════════════════════════════════════════════════════════
    const node = nodeGroup.selectAll("g")
      .data(nodes)
      .join("g")
      .attr("class", "node")
      .call(d3.drag()
        .on("start", dragStart)
        .on("drag", dragged)
        .on("end", dragEnd));

    // Circle
    node.append("circle")
      .attr("r", nodeRadius)
      .attr("fill", d => nodeColor(d.type));

    // Label (shown below circle for large nodes, hidden for tiny ones)
    node.append("text")
      .attr("dy", d => nodeRadius(d) + 11)
      .text(d => d.label.length > 20 ? d.label.slice(0, 18) + "…" : d.label)
      .style("font-size", d => d.degree > 3 ? "11px" : "9px")
      .style("opacity", d => d.degree > 2 ? 1 : 0.5);

    // ═══════════════════════════════════════════════════════════════════════════
    // SIMULATION TICK
    // ═══════════════════════════════════════════════════════════════════════════
    simulation.on("tick", () => {
      link
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);

      edgeLabel
        .attr("x", d => (d.source.x + d.target.x) / 2)
        .attr("y", d => (d.source.y + d.target.y) / 2);

      node.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    // ═══════════════════════════════════════════════════════════════════════════
    // TOOLTIP & HOVER
    // ═══════════════════════════════════════════════════════════════════════════
    let selectedNode = null;

    node.on("mouseover", (e, d) => {
      const connections = links.filter(l =>
        l.source.id === d.id || l.target.id === d.id
      ).length;

      tooltip.innerHTML = `
    <div class="tt-name">${d.label}</div>
    <div class="tt-type" style="color:${nodeColor(d.type)}">${d.type}</div>
    ${d.description ? `<div class="tt-desc">${d.description}</div>` : ""}
    <div class="tt-connections"><span>${connections}</span> connection${connections !== 1 ? "s" : ""}</div>
  `;
      tooltip.classList.add("visible");
      positionTooltip(e);
    })
      .on("mousemove", positionTooltip)
      .on("mouseleave", () => tooltip.classList.remove("visible"))
      .on("click", (e, d) => {
        e.stopPropagation();
        if (selectedNode === d.id) {
          clearSelection();
        } else {
          selectNode(d);
        }
      });

    svg.on("click", clearSelection);

    function positionTooltip(e) {
      const rect = container.getBoundingClientRect();
      let x = e.clientX - rect.left + 14;
      let y = e.clientY - rect.top - 10;
      if (x + 280 > W) x = e.clientX - rect.left - 280;
      tooltip.style.left = x + "px";
      tooltip.style.top = y + "px";
    }

    function selectNode(d) {
      selectedNode = d.id;
      const connectedIds = new Set([d.id]);
      links.forEach(l => {
        if (l.source.id === d.id) connectedIds.add(l.target.id);
        if (l.target.id === d.id) connectedIds.add(l.source.id);
      });

      node.classed("selected", n => n.id === d.id);
      node.classed("dimmed", n => !connectedIds.has(n.id));
      link.classed("highlighted", l => l.source.id === d.id || l.target.id === d.id);
      link.classed("dimmed", l => l.source.id !== d.id && l.target.id !== d.id);
    }

    function clearSelection() {
      selectedNode = null;
      node.classed("selected dimmed", false);
      link.classed("highlighted dimmed", false);
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // DRAG
    // ═══════════════════════════════════════════════════════════════════════════
    function dragStart(e, d) {
      if (!e.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x; d.fy = d.y;
    }
    function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
    function dragEnd(e, d) {
      if (!e.active) simulation.alphaTarget(0);
      d.fx = null; d.fy = null;
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // LEGEND
    // ═══════════════════════════════════════════════════════════════════════════
    const typeCounts = {};
    nodes.forEach(n => { typeCounts[n.type] = (typeCounts[n.type] || 0) + 1; });

    const hiddenTypes = new Set();
    const legendEl = document.getElementById("legend");
    const filterStateEl = document.getElementById("filter-state");
    legendEl.innerHTML = '';

    function updateFilterState() {
      if (!filterStateEl) return;
      const totalCheckboxes = document.querySelectorAll("#legend input[type='checkbox']").length;
      const visibleCount = totalCheckboxes - hiddenTypes.size;

      if (hiddenTypes.size === 0) filterStateEl.textContent = "Showing: All";
      else if (visibleCount === 0) filterStateEl.textContent = "Showing: None";
      else if (visibleCount === 1) {
        let activeCb = Array.from(document.querySelectorAll("#legend input[type='checkbox']")).find(cb => cb.checked);
        filterStateEl.textContent = `Showing: ${activeCb ? activeCb.value : ''}`;
      } else {
        filterStateEl.textContent = `Showing: ${visibleCount} types`;
      }
    }

    // Ensure these required ones are exactly displayed in checkboxes
    const CORE_TYPES = ["PERSON", "CONCEPT", "LOCATION", "EVENT", "OBJECT", "ORGANIZATION"];
    const typesToRender = Array.from(new Set([...Object.keys(typeCounts), ...CORE_TYPES]));

    typesToRender.forEach(type => {
      const color = COLOR_MAP[type] || COLOR_MAP.OTHER;
      const count = typeCounts[type] || 0;

      const item = document.createElement("label");
      item.className = "legend-item";
      item.style.display = "flex";
      item.style.alignItems = "center";
      item.style.cursor = "pointer";
      item.style.padding = "2px 0";

      const isChecked = !hiddenTypes.has(type);

      item.innerHTML = `
    <input type="checkbox" value="${type}" ${isChecked ? 'checked' : ''} style="margin-right: 8px; cursor: pointer;">
    <div class="legend-dot" style="background:${color}; width:10px; height:10px; min-width:10px; border-radius:50%; margin-right:6px; display:inline-block;"></div>
    <span class="legend-name" style="flex:1;">${type}</span>
    <span class="legend-count" style="color:var(--text-muted); font-size:11px;">(${count})</span>
  `;

      const checkbox = item.querySelector("input");
      checkbox.addEventListener("change", (e) => {
        if (e.target.checked) hiddenTypes.delete(type);
        else hiddenTypes.add(type);

        applyTypeFilter();
        updateFilterState();

        // Reprocess search dynamically over new filtered subset
        document.getElementById("search-form").dispatchEvent(new Event("submit"));
      });

      legendEl.appendChild(item);
    });

    updateFilterState();

    const btnClearFilters = document.getElementById("btn-clear-filters");
    if (btnClearFilters) {
      btnClearFilters.addEventListener("click", () => {
        hiddenTypes.clear();
        document.querySelectorAll("#legend input[type='checkbox']").forEach(cb => cb.checked = true);
        applyTypeFilter();
        updateFilterState();
        clearSelection();
        document.getElementById("search-form").dispatchEvent(new Event("submit"));
      });
    }

    function applyTypeFilter() {
      node.style("display", d => hiddenTypes.has(d.type) ? "none" : null);
      link.style("display", d => {
        const sHidden = hiddenTypes.has(d.source.type);
        const tHidden = hiddenTypes.has(d.target.type);
        return sHidden || tHidden ? "none" : null;
      });
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // SEARCH
    // ═══════════════════════════════════════════════════════════════════════════
    const searchForm = document.getElementById("search-form");
    const searchInput = document.getElementById("search");
    const searchFeedback = document.getElementById("search-feedback");
    const btnClear = document.getElementById("btn-clear");

    searchForm.addEventListener("submit", e => {
      e.preventDefault();
      performSearch();
    });

    btnClear.addEventListener("click", () => {
      searchInput.value = "";
      searchFeedback.style.display = "none";
      clearSelection();
      // Return to default view (reset zoom/pan)
      svg.transition().duration(500).call(
        zoom.transform, d3.zoomIdentity.translate(0, 0).scale(1)
      );
    });

    // Detect clear "X" button click or backspace clearing the input
    searchInput.addEventListener("input", e => {
      if (e.target.value.trim() === "") {
        searchFeedback.style.display = "none";
        clearSelection();
      }
    });

    function performSearch() {
      const q = searchInput.value.toLowerCase().trim();
      if (!q) {
        clearSelection();
        searchFeedback.style.display = "none";
        return;
      }

      // Filter by hidden types to ensure we only search visible nodes
      searchFeedback.style.display = "none";

      let exactMatch = null;
      let partialMatch = null;

      for (let i = 0; i < nodes.length; i++) {
        const n = nodes[i];
        if (hiddenTypes.has(n.type)) continue;

        const label = n.label || "";
        const lowerLabel = label.toLowerCase();

        if (lowerLabel === q) {
          exactMatch = n;
          break; // Found exact match, stop searching
        } else if (!partialMatch && lowerLabel.includes(q)) {
          partialMatch = n;
        }
      }

      const match = exactMatch || partialMatch;

      if (match) {
        selectNode(match);

        // Zoom and center on the matched node
        const scale = 1.5; // Zoom level
        const x = W / 2 - match.x * scale;
        const y = H / 2 - match.y * scale;

        svg.transition().duration(750).call(
          zoom.transform,
          d3.zoomIdentity.translate(x, y).scale(scale)
        );
      } else {
        clearSelection();
        searchFeedback.style.display = "block";
      }
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // CONTROLS
    // ═══════════════════════════════════════════════════════════════════════════
    document.getElementById("link-distance").addEventListener("input", e => {
      const val = +e.target.value;
      simulation.force("link").distance(d => val);
      simulation.alpha(0.5).restart();
    });
    document.getElementById("link-distance").addEventListener("change", e => {
      simulation.alpha(1).restart();
    });

    document.getElementById("charge").addEventListener("input", e => {
      const val = +e.target.value;
      simulation.force("charge").strength(d => val);
      simulation.alpha(0.5).restart();
    });
    document.getElementById("charge").addEventListener("change", e => {
      simulation.alpha(1).restart();
    });

    document.getElementById("label-threshold").addEventListener("input", e => {
      const threshold = +e.target.value;
      edgeLabel.classed("visible", d => {
        const minDeg = Math.min(d.source.degree || 1, d.target.degree || 1);
        return minDeg >= threshold;
      });
    });

    document.getElementById("btn-reset").addEventListener("click", () => {
      svg.transition().duration(500).call(
        zoom.transform, d3.zoomIdentity.translate(0, 0).scale(1)
      );
    });

    // Using explicit clear-filters button instead now

    // ═══════════════════════════════════════════════════════════════════════════
    // STATS
    // ═══════════════════════════════════════════════════════════════════════════
    document.getElementById("stat-nodes").textContent = nodes.length;
    document.getElementById("stat-edges").textContent = links.length;
    document.getElementById("stat-communities").textContent =
      GRAPH_DATA.communities !== undefined ? GRAPH_DATA.communities : "—";

    // ═══════════════════════════════════════════════════════════════════════════
    // RESIZE
    // ═══════════════════════════════════════════════════════════════════════════
    window.addEventListener("resize", () => {
      W = container.clientWidth;
      H = container.clientHeight;
      simulation.force("center", d3.forceCenter(W / 2, H / 2));
      simulation.alpha(0.1).restart();
    });
  </script>
</body>

</html>
