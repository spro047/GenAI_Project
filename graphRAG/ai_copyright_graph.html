<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Copyright & Governance — Knowledge Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:           #0a0e1a;
    --surface:      #111827;
    --border:       #1e2d45;
    --text:         #e2e8f0;
    --text-muted:   #64748b;
    --accent:       #38bdf8;

    --c-org:        #4ECDC4;
    --c-person:     #FF6B6B;
    --c-leg:        #60a5fa;
    --c-case:       #FBBF24;
    --c-concept:    #86efac;
    --c-gov:        #c084fc;
    --c-ai:         #fb923c;
    --c-other:      #94a3b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stats {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    gap: 16px;
  }

  .stats span { color: var(--text); }

  /* ── Layout ──────────────────────────────────────────────────── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────────────────────────── */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }

  /* ── Legend items ────────────────────────────────────────────── */
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 6px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .legend-item:hover { background: rgba(255,255,255,0.04); }

  .legend-item.disabled { opacity: 0.3; }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-name {
    font-size: 12px;
    color: var(--text);
    flex: 1;
  }

  .legend-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  /* ── Search ──────────────────────────────────────────────────── */
  .search-wrap { padding: 12px 16px; border-bottom: 1px solid var(--border); }

  input[type="search"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="search"]:focus { border-color: var(--accent); }
  input[type="search"]::placeholder { color: var(--text-muted); }

  /* ── Controls ────────────────────────────────────────────────── */
  .controls { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

  .control-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .control-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .btn-row { display: flex; gap: 6px; margin-top: 4px; }

  button {
    flex: 1;
    padding: 6px 8px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  button:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Canvas ──────────────────────────────────────────────────── */
  #graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg { width: 100%; height: 100%; }

  /* ── Links ───────────────────────────────────────────────────── */
  .link {
    stroke: #1e3a5f;
    stroke-opacity: 0.7;
    stroke-width: 1.5px;
    transition: stroke 0.2s, stroke-opacity 0.2s;
  }

  .link.highlighted { stroke: var(--accent); stroke-opacity: 1; stroke-width: 2px; }
  .link.dimmed      { stroke-opacity: 0.08; }

  /* ── Edge labels ─────────────────────────────────────────────── */
  .edge-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    fill: #334155;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .edge-label.visible { opacity: 1; }

  /* ── Nodes ───────────────────────────────────────────────────── */
  .node circle {
    stroke: rgba(255,255,255,0.15);
    stroke-width: 1.5px;
    cursor: pointer;
    transition: stroke 0.15s, stroke-width 0.15s, filter 0.15s;
  }

  .node circle:hover {
    stroke: white;
    stroke-width: 2.5px;
    filter: brightness(1.3);
  }

  .node.selected circle { stroke: white; stroke-width: 3px; filter: brightness(1.4); }
  .node.dimmed circle   { opacity: 0.12; }
  .node.dimmed text     { opacity: 0.05; }

  .node text {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    fill: var(--text);
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: middle;
    transition: opacity 0.2s;
  }

  /* ── Tooltip ─────────────────────────────────────────────────── */
  #tooltip {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 13px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 260px;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  #tooltip.visible { opacity: 1; }

  .tt-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 3px;
    color: var(--text);
  }

  .tt-type {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .tt-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 6px;
  }

  .tt-connections {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    padding-top: 6px;
    margin-top: 4px;
  }

  .tt-connections span { color: var(--accent); }
</style>
</head>

<header>
  <h1>Knowledge Graph — AI Copyright &amp; Governance</h1>
  <div class="stats">
    nodes <span id="stat-nodes">—</span> &nbsp;|&nbsp;
    edges <span id="stat-edges">—</span> &nbsp;|&nbsp;
    communities <span id="stat-communities">—</span>
  </div>
</header>

<div class="layout">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="search-wrap">
      <input type="search" id="search" placeholder="Search nodes…">
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Entity Types</div>
      <div id="legend"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Controls</div>
      <div class="controls">
        <div class="control-row">
          <div class="control-label">Link distance</div>
          <input type="range" id="link-distance" min="40" max="300" value="120">
        </div>
        <div class="control-row">
          <div class="control-label">Charge strength</div>
          <input type="range" id="charge" min="-800" max="-50" value="-300">
        </div>
        <div class="control-row">
          <div class="control-label">Edge labels</div>
          <input type="range" id="label-threshold" min="0" max="10" value="3"
                 title="Show labels on edges connecting nodes with degree ≥ this value">
        </div>
        <div class="btn-row">
          <button id="btn-reset">Reset zoom</button>
          <button id="btn-all">Show all</button>
        </div>
      </div>
    </div>

  </aside>

  <!-- ── Graph canvas ────────────────────────────────── -->
  <div id="graph-container">
    <svg id="graph">
      <defs>
        <marker id="arrow" viewBox="0 -4 10 8" refX="18" refY="0"
                markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,-4L10,0L0,4" fill="#1e3a5f"/>
        </marker>
      </defs>
      <g id="root"></g>
    </svg>
    <div id="tooltip"></div>
  </div>

</div>

: "U.S. CODE", "label": "REFERENCES", "description": "The University of South Florida references the U.S. Code to explain copyright laws."}, {"source": "STABLE DIFFUSION", "target": "LAION", "label": "TRAINED_ON", "description": "Stable Diffusion was trained on datasets provided by LAION, which include image-text pairs."}, {"source": "US CONGRESS", "target": "COPYRIGHT CLAUSE", "label": "REGULATES", "description": "The US Congress has the authority to regulate copyright law under the Copyright Clause."}, {"source": "ADAM SCHIFF", "target": "GENERATIVE AI COPYRIGHT DISCLOSURE ACT", "label": "ADVOCATES_FOR", "description": "Adam Schiff proposed the Generative AI Copyright Disclosure Act to regulate AI companies."}, {"source": "THOMSON REUTERS", "target": "ROSS INTELLIGENCE", "label": "FILED_AGAINST", "description": "Thomson Reuters filed a lawsuit against Ross Intelligence for copyright infringement."}, {"source": "AI-GENERATED WORKS", "target": "FAIR USE", "label": "REFERENCES", "description": "The concept of fair use is often referenced in legal discussions about AI-generated works."}, {"source": "FAIR USE", "target": "RACHAEL G. SAMBERG", "label": "ADVOCATES_FOR", "description": "Rachael G. Samberg advocates for the recognition of fair use in the context of training AI models."}, {"source": "FAIR USE", "target": "TIMOTHY VOLLMER", "label": "ADVOCATES_FOR", "description": "Timothy Vollmer supports the fair use doctrine as essential for research methodologies involving AI."}, {"source": "FAIR USE", "target": "SAMANTHA TEREMI", "label": "ADVOCATES_FOR", "description": "Samantha Teremi argues for the importance of fair use in the context of AI training and research."}, {"source": "FAIR USE", "target": "LIBRARY COPYRIGHT ALLIANCE", "label": "ADVOCATES_FOR", "description": "The Library Copyright Alliance champions fair use in the context of copyright and AI."}, {"source": "FAIR USE", "target": "TEXT AND DATA MINING", "label": "ADVOCATES_FOR", "description": "Text and data mining methodologies are supported under the fair use doctrine."}, {"source": "FAIR USE", "target": "US COPYRIGHT ACT", "label": "REGULATES", "description": "Fair use is a legal doctrine that is defined and regulated under the US Copyright Act."}, {"source": "GENERATIVE ARTIFICIAL INTELLIGENCE", "target": "LAION", "label": "PART_OF", "description": "LAION provides datasets that are essential for training generative AI models."}, {"source": "JERRY KAPLAN", "target": "AI ETHICS", "label": "ADVOCATES_FOR", "description": "Jerry Kaplan advocates for ethical considerations in the development and deployment of AI technologies."}, {"source": "US COPYRIGHT ACT", "target": "AUTHORS GUILD V. HATHITRUST", "label": "REGULATES", "description": "The case established precedents that interpret the US Copyright Act in relation to fair use."}, {"source": "US COPYRIGHT ACT", "target": "AUTHORS GUILD V. GOOGLE", "label": "REGULATES", "description": "The case upheld fair use principles that are relevant to the application of the US Copyright Act."}], "communities": 28};

// ═══════════════════════════════════════════════════════════════════════════
// COLOUR MAP
// ═══════════════════════════════════════════════════════════════════════════
const COLOR_MAP = {
  ORGANIZATION: "#4ECDC4",
  PERSON:       "#FF6B6B",
  LEGISLATION:  "#60a5fa",
  LEGAL_CASE:   "#FBBF24",
  CONCEPT:      "#86efac",
  GOVERNMENT:   "#c084fc",
  AI_SYSTEM:    "#fb923c",
  OTHER:        "#94a3b8",
};

function nodeColor(type) {
  return COLOR_MAP[type] || COLOR_MAP.OTHER;
}

// ═══════════════════════════════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════════════════════════════
const svg       = d3.select("#graph");
const root      = d3.select("#root");
const tooltip   = document.getElementById("tooltip");
const container = document.getElementById("graph-container");

let W = container.clientWidth;
let H = container.clientHeight;

// Zoom behaviour
const zoom = d3.zoom()
  .scaleExtent([0.1, 4])
  .on("zoom", e => root.attr("transform", e.transform));
svg.call(zoom);

// ═══════════════════════════════════════════════════════════════════════════
// FORCE SIMULATION
// ═══════════════════════════════════════════════════════════════════════════
const nodes = GRAPH_DATA.nodes.map(d => ({ ...d }));
const links = GRAPH_DATA.links.map(d => ({ ...d }));

// Compute degree for node sizing
const degreeMap = {};
links.forEach(l => {
  degreeMap[l.source] = (degreeMap[l.source] || 0) + 1;
  degreeMap[l.target] = (degreeMap[l.target] || 0) + 1;
});
nodes.forEach(n => { n.degree = degreeMap[n.id] || 1; });

const maxDeg = Math.max(...nodes.map(n => n.degree));
const minDeg = Math.min(...nodes.map(n => n.degree));
const nodeRadius = d => {
  const t = (d.degree - minDeg) / (maxDeg - minDeg || 1);
  return 8 + t * 28;  // 8px → 36px
};

let simulation = d3.forceSimulation(nodes)
  .force("link",   d3.forceLink(links).id(d => d.id).distance(120))
  .force("charge", d3.forceManyBody().strength(-300))
  .force("center", d3.forceCenter(W / 2, H / 2))
  .force("collision", d3.forceCollide().radius(d => nodeRadius(d) + 6));

// ═══════════════════════════════════════════════════════════════════════════
// DRAW LINKS
// ═══════════════════════════════════════════════════════════════════════════
const linkGroup = root.append("g").attr("class", "links");
const labelGroup = root.append("g").attr("class", "edge-labels");
const nodeGroup  = root.append("g").attr("class", "nodes");

const link = linkGroup.selectAll("line")
  .data(links)
  .join("line")
  .attr("class", "link")
  .attr("marker-end", "url(#arrow)");

const edgeLabel = labelGroup.selectAll("text")
  .data(links)
  .join("text")
  .attr("class", "edge-label")
  .text(d => d.label || "");

// ═══════════════════════════════════════════════════════════════════════════
// DRAW NODES
// ═══════════════════════════════════════════════════════════════════════════
const node = nodeGroup.selectAll("g")
  .data(nodes)
  .join("g")
  .attr("class", "node")
  .call(d3.drag()
    .on("start", dragStart)
    .on("drag",  dragged)
    .on("end",   dragEnd));

// Circle
node.append("circle")
  .attr("r", nodeRadius)
  .attr("fill", d => nodeColor(d.type));

// Label (shown below circle for large nodes, hidden for tiny ones)
node.append("text")
  .attr("dy", d => nodeRadius(d) + 11)
  .text(d => d.label.length > 20 ? d.label.slice(0, 18) + "…" : d.label)
  .style("font-size", d => d.degree > 3 ? "11px" : "9px")
  .style("opacity", d => d.degree > 2 ? 1 : 0.5);

// ═══════════════════════════════════════════════════════════════════════════
// SIMULATION TICK
// ═══════════════════════════════════════════════════════════════════════════
simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  edgeLabel
    .attr("x", d => (d.source.x + d.target.x) / 2)
    .attr("y", d => (d.source.y + d.target.y) / 2);

  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ═══════════════════════════════════════════════════════════════════════════
// TOOLTIP & HOVER
// ═══════════════════════════════════════════════════════════════════════════
let selectedNode = null;

node.on("mouseover", (e, d) => {
  const connections = links.filter(l =>
    l.source.id === d.id || l.target.id === d.id
  ).length;

  tooltip.innerHTML = `
    <div class="tt-name">${d.label}</div>
    <div class="tt-type" style="color:${nodeColor(d.type)}">${d.type}</div>
    ${d.description ? `<div class="tt-desc">${d.description}</div>` : ""}
    <div class="tt-connections"><span>${connections}</span> connection${connections !== 1 ? "s" : ""}</div>
  `;
  tooltip.classList.add("visible");
  positionTooltip(e);
})
.on("mousemove", positionTooltip)
.on("mouseleave", () => tooltip.classList.remove("visible"))
.on("click", (e, d) => {
  e.stopPropagation();
  if (selectedNode === d.id) {
    clearSelection();
  } else {
    selectNode(d);
  }
});

svg.on("click", clearSelection);

function positionTooltip(e) {
  const rect = container.getBoundingClientRect();
  let x = e.clientX - rect.left + 14;
  let y = e.clientY - rect.top  - 10;
  if (x + 280 > W) x = e.clientX - rect.left - 280;
  tooltip.style.left = x + "px";
  tooltip.style.top  = y + "px";
}

function selectNode(d) {
  selectedNode = d.id;
  const connectedIds = new Set([d.id]);
  links.forEach(l => {
    if (l.source.id === d.id) connectedIds.add(l.target.id);
    if (l.target.id === d.id) connectedIds.add(l.source.id);
  });

  node.classed("selected", n => n.id === d.id);
  node.classed("dimmed",   n => !connectedIds.has(n.id));
  link.classed("highlighted", l => l.source.id === d.id || l.target.id === d.id);
  link.classed("dimmed",      l => l.source.id !== d.id && l.target.id !== d.id);
}

function clearSelection() {
  selectedNode = null;
  node.classed("selected dimmed", false);
  link.classed("highlighted dimmed", false);
}

// ═══════════════════════════════════════════════════════════════════════════
// DRAG
// ═══════════════════════════════════════════════════════════════════════════
function dragStart(e, d) {
  if (!e.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(e, d)   { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d)   {
  if (!e.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// ═══════════════════════════════════════════════════════════════════════════
// LEGEND
// ═══════════════════════════════════════════════════════════════════════════
const typeCounts = {};
nodes.forEach(n => { typeCounts[n.type] = (typeCounts[n.type] || 0) + 1; });

const hiddenTypes = new Set();
const legendEl = document.getElementById("legend");

Object.entries(COLOR_MAP).forEach(([type, color]) => {
  if (!typeCounts[type]) return;
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `
    <div class="legend-dot" style="background:${color}"></div>
    <span class="legend-name">${type}</span>
    <span class="legend-count">${typeCounts[type]}</span>
  `;
  item.addEventListener("click", () => {
    if (hiddenTypes.has(type)) {
      hiddenTypes.delete(type);
      item.classList.remove("disabled");
    } else {
      hiddenTypes.add(type);
      item.classList.add("disabled");
    }
    applyTypeFilter();
  });
  legendEl.appendChild(item);
});

function applyTypeFilter() {
  node.style("display", d => hiddenTypes.has(d.type) ? "none" : null);
  link.style("display", d => {
    const sHidden = hiddenTypes.has(d.source.type);
    const tHidden = hiddenTypes.has(d.target.type);
    return sHidden || tHidden ? "none" : null;
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════════════════
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) { clearSelection(); return; }
  const match = nodes.find(n => n.label.toLowerCase().includes(q));
  if (match) selectNode(match);
});

// ═══════════════════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════════════════
document.getElementById("link-distance").addEventListener("input", e => {
  simulation.force("link").distance(+e.target.value);
  simulation.alpha(0.3).restart();
});

document.getElementById("charge").addEventListener("input", e => {
  simulation.force("charge").strength(+e.target.value);
  simulation.alpha(0.3).restart();
});

document.getElementById("label-threshold").addEventListener("input", e => {
  const threshold = +e.target.value;
  edgeLabel.classed("visible", d => {
    const minDeg = Math.min(d.source.degree || 1, d.target.degree || 1);
    return minDeg >= threshold;
  });
});

document.getElementById("btn-reset").addEventListener("click", () => {
  svg.transition().duration(500).call(
    zoom.transform, d3.zoomIdentity.translate(0, 0).scale(1)
  );
});

document.getElementById("btn-all").addEventListener("click", () => {
  hiddenTypes.clear();
  document.querySelectorAll(".legend-item").forEach(el => el.classList.remove("disabled"));
  applyTypeFilter();
  clearSelection();
});

// ═══════════════════════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════════════════════
document.getElementById("stat-nodes").textContent = nodes.length;
document.getElementById("stat-edges").textContent = links.length;
document.getElementById("stat-communities").textContent =
  GRAPH_DATA.communities !== undefined ? GRAPH_DATA.communities : "—";

// ═══════════════════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════════════════
window.addEventListener("resize", () => {
  W = container.clientWidth;
  H = container.clientHeight;
  simulation.force("center", d3.forceCenter(W / 2, H / 2));
  simulation.alpha(0.1).restart();
});
</script>
</body>
</html>
